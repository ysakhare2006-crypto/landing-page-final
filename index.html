<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Landing Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header class="navbar">
  <h2 class="logo">MyBrand</h2>
  <nav>
    <a href="#features">Features</a>
    <a href="#pricing">Pricing</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- Hero Section -->
<section class="hero">
  <h1>Build Your Dream Website</h1>
  <p>Modern, fast and responsive landing page</p>
  <button onclick="window.location.href='#features'">
  Get Started
</button>
</section>

<!-- Features -->
<section id="features" class="features">
  <h2>Features</h2>
  <div class="feature-box">
    <div class="card">⚡ Fast</div>
    <div class="card">📱 Responsive</div>
    <div class="card">🎨 Clean Design</div>
  </div>
</section>

<!-- Pricing -->
<section id="pricing" class="pricing">
  <h2>Pricing</h2>
  <div class="pricing-box">
    <div class="card">
      <h3>Basic</h3>
      <p>₹199/month</p>
    </div>
    <div class="card">
      <h3>Pro</h3>
      <p>₹499/month</p>
    </div>
    <div class="card">
      <h3>Premium</h3>
      <p>₹999/month</p>
    </div>
  </div>
</section>

<!-- Contact -->
<section id="contact" class="contact">
  <h2>Contact Us</h2>
  <form>
    <input type="text" placeholder="Yash Govindrao Sakhare" required>
    <input type="email" placeholder="ysakhare2006@gmail.com" required>
    <textarea placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<!-- Footer -->
<footer>
  <p>© 2026 MyBrand. All rights reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
